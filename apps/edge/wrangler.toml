name = "stagent-edge"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "TABLE"
class_name = "TableDO"

[[migrations]]
tag = "v1"
new_classes = ["TableDO"]

[[d1_databases]]
binding = "DB"
database_name = "stagent-dev"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "PRESENCE"
id = "00000000000000000000000000000000"

# Set actual value with: wrangler secret put ANTHROPIC_API_KEY
[vars]
ANTHROPIC_API_KEY = ""
