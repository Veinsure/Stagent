services:
  postgres:
    image: postgres:16-alpine
    container_name: stagent-dev-postgres
    environment:
      POSTGRES_USER: stagent
      POSTGRES_PASSWORD: stagent
      POSTGRES_DB: stagent
    ports:
      - "5432:5432"
    volumes:
      - stagent-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stagent -d stagent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  stagent-pgdata:
